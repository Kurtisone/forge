<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --user-bg:  #1f6feb;
      --bot-bg:   #21262d;
      --radius:   10px;
      --font:     'Segoe UI', system-ui, sans-serif;
      --mono:     'Cascadia Code', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    .logo span { color: var(--accent); }
    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .dot.ok  { background: var(--green); }
    .dot.err { background: var(--red); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 20px;
      font-size: .9rem;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Panels ── */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ── Chat ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: .92rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      background: var(--user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      background: var(--bot-bg);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
    }
    .msg.bot.error { border-color: var(--red); }
    .msg-meta {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .msg.bot pre, .msg.bot code {
      font-family: var(--mono);
      font-size: .85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin-top: 6px;
      display: block;
    }
    .thinking {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: .85rem;
    }
    .dots span {
      animation: blink 1.2s infinite;
      font-size: 1.4rem; line-height: 0;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0 } 40% { opacity: 1 } }

    #chat-input-row {
      display: flex; gap: 8px;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .92rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 160px;
      transition: border-color .2s;
      overflow-y: auto;
    }
    textarea:focus { border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
      align-self: flex-end;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

    /* ── Review panel ── */
    #review-panel {
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }
    .field-label {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .field { display: flex; flex-direction: column; }
    #review-code {
      font-family: var(--mono);
      font-size: .85rem;
      min-height: 200px;
      max-height: 300px;
    }
    #review-filename, #review-question {
      max-height: 44px;
      min-height: 44px;
    }
    #review-result {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: .9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      min-height: 100px;
      display: none;
    }
    #review-result.visible { display: block; }
    #review-result.error { border-color: var(--red); }
    #review-actions {
      display: flex; gap: 10px; align-items: center;
    }
    #review-spinner {
      display: none;
      color: var(--muted); font-size: .85rem;
    }
    #review-spinner.visible { display: flex; align-items: center; gap: 8px; }

    /* ── Traces panel ── */
    #traces-panel {
      padding: 20px;
      overflow-y: auto;
      gap: 10px;
    }
    .trace-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: .85rem;
    }
    .trace-card:hover { border-color: var(--accent); }
    .trace-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .trace-id { font-family: var(--mono); color: var(--accent); font-size: .78rem; }
    .trace-ok  { color: var(--green); }
    .trace-err { color: var(--red); }
    .trace-time { color: var(--muted); font-size: .75rem; }
    .trace-input { color: var(--muted); font-style: italic; margin-bottom: 6px; }
    .trace-steps { display: flex; gap: 6px; flex-wrap: wrap; }
    .step-pill {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
      font-size: .75rem; color: var(--muted);
    }
    .step-pill.ok  { border-color: var(--green); color: var(--green); }
    .step-pill.err { border-color: var(--red);   color: var(--red); }
    #traces-refresh {
      align-self: flex-start; margin-bottom: 4px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚙ <span>Forge</span></div>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="chat">Chat</div>
  <div class="tab" data-tab="review">Review</div>
  <div class="tab" data-tab="traces">Traces</div>
</div>

<!-- Chat -->
<div class="panel active" id="chat-panel">
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <textarea id="chat-input" placeholder="Posez votre question…" rows="1"></textarea>
    <button id="send-btn" onclick="sendChat()">Envoyer</button>
  </div>
</div>

<!-- Review -->
<div class="panel" id="review-panel">
  <div class="field">
    <div class="field-label">Nom du fichier</div>
    <textarea id="review-filename" placeholder="main.py"></textarea>
  </div>
  <div class="field">
    <div class="field-label">Contenu du fichier</div>
    <textarea id="review-code" placeholder="Collez le code ici…"></textarea>
  </div>
  <div class="field">
    <div class="field-label">Question</div>
    <textarea id="review-question" placeholder="Que peut-on améliorer ?"></textarea>
  </div>
  <div id="review-actions">
    <button onclick="sendReview()">Analyser</button>
    <div id="review-spinner">
      <div class="dots"><span>·</span><span>·</span><span>·</span></div>
      Analyse en cours…
    </div>
  </div>
  <div id="review-result"></div>
</div>

<!-- Traces -->
<div class="panel" id="traces-panel">
  <button class="btn-outline" id="traces-refresh" onclick="loadTraces()">↺ Rafraîchir</button>
  <div id="traces-list"></div>
</div>

<script>
// ── Tab switching ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById(tab.dataset.tab + '-panel').classList.add('active')
    if (tab.dataset.tab === 'traces') loadTraces()
  })
})

// ── Health check ──────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health')
    const data = await r.json()
    document.getElementById('status-dot').className = 'dot ok'
    document.getElementById('status-text').textContent =
      `${data.provider} · ${data.model.slice(0, 30)}`
  } catch {
    document.getElementById('status-dot').className = 'dot err'
    document.getElementById('status-text').textContent = 'offline'
  }
}
checkHealth()

// ── Chat ──────────────────────────────────────────────────────────
const messages = document.getElementById('chat-messages')
let _busy = false

function appendMsg(text, role, meta) {
  const div = document.createElement('div')
  div.className = `msg ${role}`
  div.innerHTML = formatContent(text)
  if (meta) {
    const m = document.createElement('div')
    m.className = 'msg-meta'
    m.textContent = meta
    div.appendChild(m)
  }
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
  return div
}

function formatContent(text) {
  // Wrap code blocks in <pre>
  return text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre>${escapeHtml(code.trim())}</pre>`
  ).replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`)
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function showThinking() {
  const div = document.createElement('div')
  div.className = 'msg bot thinking'
  div.id = 'thinking-indicator'
  div.innerHTML = '<div class="dots"><span>·</span><span>·</span><span>·</span></div>'
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}

function removeThinking() {
  document.getElementById('thinking-indicator')?.remove()
}

async function sendChat() {
  if (_busy) return
  const input = document.getElementById('chat-input')
  const text = input.value.trim()
  if (!text) return

  _busy = true
  document.getElementById('send-btn').disabled = true
  input.value = ''
  input.style.height = 'auto'

  appendMsg(text, 'user')
  showThinking()

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    })
    const data = await r.json()
    removeThinking()
    const meta = `${data.tool} · ${data.steps} step${data.steps > 1 ? 's' : ''}`
    const div = appendMsg(data.output || '[empty response]', 'bot' + (data.ok ? '' : ' error'), meta)
    if (!data.ok) div.title = data.error || ''
  } catch (e) {
    removeThinking()
    appendMsg(`Erreur réseau : ${e.message}`, 'bot error')
  }

  _busy = false
  document.getElementById('send-btn').disabled = false
  input.focus()
}

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 160) + 'px'
})

// Send on Enter (Shift+Enter = newline)
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat() }
})

// ── Review ────────────────────────────────────────────────────────
async function sendReview() {
  const content  = document.getElementById('review-code').value.trim()
  const filename = document.getElementById('review-filename').value.trim() || 'untitled.txt'
  const question = document.getElementById('review-question').value.trim()
    || 'Que peut-on améliorer ?'
  if (!content) return

  const spinner = document.getElementById('review-spinner')
  const result  = document.getElementById('review-result')
  spinner.classList.add('visible')
  result.classList.remove('visible', 'error')
  result.textContent = ''

  try {
    const r = await fetch('/review', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content, filename, question})
    })
    const data = await r.json()
    result.textContent = data.output || '[empty response]'
    result.classList.add('visible')
    if (!data.ok) result.classList.add('error')
  } catch (e) {
    result.textContent = `Erreur réseau : ${e.message}`
    result.classList.add('visible', 'error')
  }
  spinner.classList.remove('visible')
}

// ── Traces ────────────────────────────────────────────────────────
async function loadTraces() {
  const list = document.getElementById('traces-list')
  list.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Chargement…</div>'
  try {
    const r = await fetch('/traces?n=15')
    const data = await r.json()
    const traces = data.traces || []
    if (!traces.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Aucune trace pour l\'instant.</div>'
      return
    }
    list.innerHTML = ''
    ;[...traces].reverse().forEach(t => {
      const ok = t.ok
      const card = document.createElement('div')
      card.className = 'trace-card'
      const steps = (t.steps || []).map(s =>
        `<span class="step-pill ${s.tool_ok ? 'ok' : 'err'}">${s.router_tool || '?'} ${s.duration_ms}ms</span>`
      ).join('')
      card.innerHTML = `
        <div class="trace-header">
          <span class="trace-id">#${t.run_id}</span>
          <span class="${ok ? 'trace-ok' : 'trace-err'}">${ok ? '✓' : '✗'}</span>
          <span class="trace-time">${t.timestamp} · ${t.total_ms}ms</span>
        </div>
        <div class="trace-input">${escapeHtml(t.user_input_preview || '')}</div>
        <div class="trace-steps">${steps}</div>
        ${t.error ? `<div style="color:var(--red);font-size:.78rem;margin-top:6px">⚠ ${escapeHtml(t.error)}</div>` : ''}
      `
      list.appendChild(card)
    })
  } catch (e) {
    list.innerHTML = `<div style="color:var(--red);font-size:.85rem">Erreur : ${e.message}</div>`
  }
}
</script>
</body>
</html>
